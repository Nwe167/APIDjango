<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile | CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div id="sidebarSlot"></div>
    <div class="app-content">
        <div id="navbarSlot"></div>
        <main class="app-main">
            <section class="dashboard-hero mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <div class="stat-pill mb-3"><i class="bi bi-person"></i> Profile</div>
                        <h1 class="fw-black mb-2">Your account profile</h1>
                        <p class="section-subtitle mb-0">Update your name, locale, and visible avatar URL.</p>
                    </div>
                    <span class="badge text-bg-primary">Account details</span>
                </div>
            </section>

            <div class="row g-3">
                <div class="col-12 col-xl-4">
                    <div class="content-card text-center h-100">
                        <div class="avatar-circle mx-auto mb-3" style="width:96px;height:96px;font-size:2rem;">U</div>
                        <div class="fw-bold fs-4" id="navUserName">User</div>
                        <div class="text-secondary" id="sidebarUserEmail">user@example.com</div>
                        <div class="mt-3 small text-secondary">Use settings to change theme and file preferences.</div>
                    </div>
                </div>
                <div class="col-12 col-xl-8">
                    <div class="content-card h-100">
                        <form id="settingsForm" class="row g-3">
                            <div class="col-md-6"><label class="form-label">First name</label><input id="profileFirstName" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label">Last name</label><input id="profileLastName" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label">Email</label><input id="profileEmail" class="form-control" disabled></div>
                            <div class="col-md-6"><label class="form-label">Locale</label><input id="profileLocale" class="form-control"></div>
                            <div class="col-12"><label class="form-label">Photo URL</label><input id="profilePhotoUrl" class="form-control" placeholder="https://..."></div>
                            <div class="col-12"><small class="text-secondary">Storage quota: <span id="profileQuota">Unknown</span></small></div>
                            <div class="col-12 d-flex justify-content-end gap-2">
                                <a href="settings.html" class="btn btn-outline-secondary rounded-4">Open settings</a>
                                <button class="btn btn-primary rounded-4" type="submit">Save profile</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/account.js"></script>
</body>
</html>
