<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings | CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div id="sidebarSlot"></div>
    <div class="app-content">
        <div id="navbarSlot"></div>
        <main class="app-main">
            <section class="dashboard-hero mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <div class="stat-pill mb-3"><i class="bi bi-sliders"></i> User settings</div>
                        <h1 class="fw-black mb-2">Theme, sorting, and view preferences</h1>
                        <p class="section-subtitle mb-0">Adjust the workspace the way you want it.</p>
                    </div>
                    <span class="badge text-bg-primary">Profile preferences</span>
                </div>
            </section>

            <div id="settingsAlert" class="mb-3"></div>
            <form id="settingsForm" class="row g-3">
                <div class="col-12 col-xl-4">
                    <div class="content-card h-100 text-center">
                        <img id="avatarPreview" class="img-fluid rounded-circle d-none mx-auto mb-3" alt="Avatar preview" style="width:140px;height:140px;object-fit:cover;">
                        <div class="file-icon mx-auto mb-3" style="width:72px;height:72px;"><i class="bi bi-person fs-2"></i></div>
                        <input type="file" id="avatarUpload" class="form-control mb-3" accept="image/*">
                        <small class="text-secondary d-block">Avatar upload uses local preview and URL persistence in the current backend schema.</small>
                    </div>
                </div>
                <div class="col-12 col-xl-8">
                    <div class="content-card h-100">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">First name</label><input id="profileFirstName" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label">Last name</label><input id="profileLastName" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label">Email</label><input id="profileEmail" class="form-control" disabled></div>
                            <div class="col-md-6"><label class="form-label">Locale</label><input id="profileLocale" class="form-control"></div>
                            <div class="col-12"><label class="form-label">Photo URL</label><input id="profilePhotoUrl" class="form-control" placeholder="https://..."></div>
                            <div class="col-12"><small class="text-secondary">Storage quota: <span id="profileQuota">Unknown</span></small></div>
                            <div class="col-md-4"><label class="form-label">Theme</label><select id="prefTheme" class="form-select"><option value="light">Light</option><option value="dark">Dark</option><option value="system">System</option></select></div>
                            <div class="col-md-4"><label class="form-label">Default view</label><select id="prefView" class="form-select"><option value="list">List</option><option value="grid">Grid</option></select></div>
                            <div class="col-md-4"><label class="form-label">Density</label><select id="prefDensity" class="form-select"><option value="comfortable">Comfortable</option><option value="compact">Compact</option></select></div>
                            <div class="col-md-6"><label class="form-label">Sort field</label><input id="prefSortField" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label">Sort direction</label><select id="prefSortDirection" class="form-select"><option value="asc">Ascending</option><option value="desc">Descending</option></select></div>
                            <div class="col-12 form-check">
                                <input class="form-check-input" type="checkbox" id="prefHiddenFiles">
                                <label class="form-check-label" for="prefHiddenFiles">Show hidden files</label>
                            </div>
                            <div class="col-12 d-flex justify-content-end gap-2">
                                <button class="btn btn-outline-secondary rounded-4" type="reset">Reset</button>
                                <button class="btn btn-primary rounded-4" type="submit">Save settings</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/account.js"></script>
</body>
</html>
