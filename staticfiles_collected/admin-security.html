<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Security | CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div id="sidebarSlot"></div>
    <div class="app-content">
        <div id="navbarSlot"></div>
        <main class="app-main">
            <section class="dashboard-hero mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <div class="stat-pill mb-3"><i class="bi bi-shield-lock"></i> Admin security panel</div>
                        <h1 class="fw-black mb-2">Audit logs, spam alerts, and DLP events</h1>
                        <p class="section-subtitle mb-0">Centralize the high-risk events your backend records.</p>
                    </div>
                    <span class="badge text-bg-danger">Admin only</span>
                </div>
            </section>

            <div class="row g-3">
                <div class="col-12">
                    <div class="security-card content-card">
                        <div class="section-title mb-2">Audit logs</div>
                        <div class="table-responsive">
                            <table class="table mb-0">
                                <thead><tr><th>Event</th><th>Actor</th><th>File</th><th>Action</th><th>Risk</th><th>Time</th></tr></thead>
                                <tbody id="auditLogTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-xl-6">
                    <div class="security-card content-card h-100">
                        <div class="section-title mb-2">Spam flags</div>
                        <div class="table-responsive">
                            <table class="table mb-0">
                                <thead><tr><th>File</th><th>Verdict</th><th>Confidence</th><th>Reason</th><th>Created</th></tr></thead>
                                <tbody id="spamTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-xl-6">
                    <div class="security-card content-card h-100">
                        <div class="section-title mb-2">DLP violations</div>
                        <div class="table-responsive">
                            <table class="table mb-0">
                                <thead><tr><th>Policy</th><th>Severity</th><th>Action</th><th>Pattern</th><th>Detected</th></tr></thead>
                                <tbody id="dlpTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/security.js"></script>
</body>
</html>
