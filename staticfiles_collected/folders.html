<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Folders | CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div id="sidebarSlot"></div>
    <div class="app-content">
        <div id="navbarSlot"></div>
        <main class="app-main">
            <section class="dashboard-hero mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <div class="stat-pill mb-3"><i class="bi bi-diagram-3"></i> Folder hierarchy</div>
                        <h1 class="fw-black mb-2">Nested folders and expandable tree view</h1>
                        <p class="section-subtitle mb-0">Browse folders visually and jump back into the file manager at any depth.</p>
                    </div>
                    <div>
                        <span class="badge text-bg-primary" id="folderTotalCount">0 folders</span>
                    </div>
                </div>
            </section>

            <section class="row g-3">
                <div class="col-12 col-xl-4">
                    <div class="content-card h-100">
                        <div class="section-title mb-2">Tree sidebar</div>
                        <div id="folderTree" class="folder-tree"></div>
                    </div>
                </div>
                <div class="col-12 col-xl-8">
                    <div class="content-card h-100">
                        <div class="section-title mb-2">Folder grid</div>
                        <div id="folderGrid" class="file-grid"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => window.CloudVaultPages.initFoldersPage());
    </script>
</body>
</html>
