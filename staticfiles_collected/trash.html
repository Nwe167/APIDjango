<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trash | CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div id="sidebarSlot"></div>
    <div class="app-content">
        <div id="navbarSlot"></div>
        <main class="app-main">
            <section class="dashboard-hero mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <div class="stat-pill mb-3"><i class="bi bi-trash3"></i> Trash management</div>
                        <h1 class="fw-black mb-2">Recover or permanently remove files</h1>
                        <p class="section-subtitle mb-0">Restore anything you deleted or empty the trash when you are done.</p>
                    </div>
                    <div class="d-flex gap-2 align-items-center">
                        <span class="badge text-bg-primary" id="trashTotalCount">0 items</span>
                        <button class="btn btn-outline-danger rounded-4" id="emptyTrashBtn">Empty trash</button>
                    </div>
                </div>
            </section>

            <section class="content-card">
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead><tr><th>Name</th><th>Owner</th><th>Size</th><th>Status</th><th>Deleted</th><th></th></tr></thead>
                        <tbody id="trashTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => window.CloudVaultPages.initTrashPage());
    </script>
</body>
</html>
