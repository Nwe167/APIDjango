<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Activity | CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div id="sidebarSlot"></div>
    <div class="app-content">
        <div id="navbarSlot"></div>
        <main class="app-main">
            <section class="dashboard-hero mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <div class="stat-pill mb-3"><i class="bi bi-clock-history"></i> Activity feed</div>
                        <h1 class="fw-black mb-2">See what changed across your workspace</h1>
                        <p class="section-subtitle mb-0">File edits, shares, comments, restores, and more in a readable timeline.</p>
                    </div>
                    <span class="badge text-bg-primary">Live history</span>
                </div>
            </section>

            <div id="activityFeedList"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => window.CloudVaultPages.initActivityPage());
    </script>
</body>
</html>
