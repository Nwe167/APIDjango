<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shared | CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div id="sidebarSlot"></div>
    <div class="app-content">
        <div id="navbarSlot"></div>
        <main class="app-main">
            <section class="dashboard-hero mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <div class="stat-pill mb-3"><i class="bi bi-share"></i> Sharing center</div>
                        <h1 class="fw-black mb-2">Collaborators and public links</h1>
                        <p class="section-subtitle mb-0">View permissions, expiration dates, and share links in one place.</p>
                    </div>
                    <span class="badge text-bg-primary">Sharing overview</span>
                </div>
            </section>

            <section class="row g-3">
                <div class="col-12 col-xl-6">
                    <div class="content-card h-100">
                        <div class="section-title mb-2">Collaborators</div>
                        <div class="table-responsive">
                            <table class="table mb-0">
                                <thead><tr><th>File</th><th>Member</th><th>Type</th><th>Role</th><th>Expires</th></tr></thead>
                                <tbody id="sharedPermissionsBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-xl-6">
                    <div class="content-card h-100">
                        <div class="section-title mb-2">Share links</div>
                        <div class="table-responsive">
                            <table class="table mb-0">
                                <thead><tr><th>File</th><th>Link</th><th>Role</th><th>Status</th><th>Expires</th></tr></thead>
                                <tbody id="sharedLinksBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => window.CloudVaultPages.initSharedPage());
    </script>
</body>
</html>
