<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Category</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5" style="max-width:600px;">
  <h2 class="mb-4">Delete Category (DELETE)</h2>

  <form id="categoryForm" method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Category ID</label>
      <input type="text" class="form-control" id="categoryId" required>
    </div>

    <button type="submit" class="btn btn-danger">Delete Category</button>
  </form>

  <div id="msg" class="mt-3"></div>
</div>

<script>
const CATEGORY_API_BASE = "http://127.0.0.1:8000/api/APICategoryUD/";

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== "") {
    const cookies = document.cookie.split(";");
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + "=")) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

const csrftoken = getCookie("csrftoken");

document.getElementById("categoryForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const categoryId = document.getElementById("categoryId").value.trim();

  if (!categoryId) {
    document.getElementById("msg").innerHTML =
      `<div class="alert alert-danger">Error: Category ID is required</div>`;
    return;
  }

  try {
    const res = await fetch(CATEGORY_API_BASE + categoryId + "/", {
      method: "DELETE",
      credentials: "same-origin",
      headers: {
        "X-CSRFToken": csrftoken
      }
    });

    if (res.status === 204) {
      document.getElementById("msg").innerHTML =
        `<div class="alert alert-success">Category deleted successfully ✅</div>`;
      document.getElementById("categoryForm").reset();
    } else {
      const data = await res.json().catch(() => null);
      throw new Error(data ? JSON.stringify(data) : ("HTTP " + res.status));
    }

  } catch (err) {
    document.getElementById("msg").innerHTML =
      `<div class="alert alert-danger">Error: ${err.message}</div>`;
  }
});
</script>

</body>
</html>
