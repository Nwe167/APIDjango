{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity - Cloud Storage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="{% static 'css/style.css' %}" rel="stylesheet" />
  <link href="{% static 'css/dashboard.css' %}" rel="stylesheet" />
  <style>.activity-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}</style>
</head>
<body>
<div class="d-flex" style="height:100vh">
  <!-- Sidebar -->
  <nav class="sidebar bg-light border-end" style="width:280px;overflow-y:auto;flex-shrink:0">
    <div class="p-4">
      <div class="d-flex align-items-center mb-4">
        <div class="bg-primary text-white p-2 rounded" style="font-size:1.5rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center">
          <i class="bi bi-cloud"></i>
        </div>
        <span class="ms-2 fw-bold" style="font-size:1.1rem">Drive</span>
      </div>
      <button class="btn btn-primary w-100 mb-4" onclick="window.location.href='/frontend/files/'">
        <i class="bi bi-plus-lg"></i> Upload File
      </button>
      <div class="nav flex-column nav-pills gap-2">
        <a href="/frontend/dashboard/" class="nav-link d-flex align-items-center" data-page="dashboard"><i class="bi bi-house-fill me-3"></i><span>My Drive</span></a>
        <a href="/frontend/files/" class="nav-link d-flex align-items-center" data-page="files"><i class="bi bi-file-earmark me-3"></i><span>Files</span></a>
        <a href="/frontend/folders/" class="nav-link d-flex align-items-center" data-page="folders"><i class="bi bi-folder me-3"></i><span>Folders</span></a>
        <a href="/frontend/shared/" class="nav-link d-flex align-items-center" data-page="shared"><i class="bi bi-share me-3"></i><span>Shared</span></a>
        <a href="/frontend/trash/" class="nav-link d-flex align-items-center" data-page="trash"><i class="bi bi-trash me-3"></i><span>Trash</span></a>
        <hr class="my-3" />
        <a href="/frontend/activity/" class="nav-link active d-flex align-items-center" data-page="activity"><i class="bi bi-activity me-3"></i><span>Activity</span></a>
        <a href="/frontend/notifications/" class="nav-link d-flex align-items-center" data-page="notifications"><i class="bi bi-bell me-3"></i><span>Notifications</span></a>
        <a href="/frontend/settings/" class="nav-link d-flex align-items-center" data-page="settings"><i class="bi bi-gear me-3"></i><span>Settings</span></a>
        <a href="/frontend/profile/" class="nav-link d-flex align-items-center" data-page="profile"><i class="bi bi-person me-3"></i><span>Profile</span></a>
        <a href="/frontend/api/" class="nav-link d-flex align-items-center" data-page="api"><i class="bi bi-code-square me-3"></i><span>File API</span></a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="flex-grow-1 d-flex flex-column" style="overflow:hidden">
    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
      <div class="container-fluid px-4">
        <div class="d-flex align-items-center flex-grow-1">
          <span class="fw-semibold text-muted">Activity</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-link" id="themeToggle" title="Toggle dark mode">
            <i class="bi bi-moon" id="themeIcon" style="font-size:1.2rem;color:#333"></i>
          </button>
          <div class="dropdown">
            <button class="btn btn-sm btn-link dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle" style="font-size:1.3rem;color:#333"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/frontend/profile/">Profile</a></li>
              <li><a class="dropdown-item" href="/frontend/settings/">Settings</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item" id="logoutBtn" href="#">Logout</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <!-- Page Content -->
    <div class="flex-grow-1 overflow-auto">
      <div class="container-fluid p-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <div>
            <h5 class="fw-bold mb-1"><i class="bi bi-activity me-2 text-primary"></i>Activity Log</h5>
            <p class="text-muted mb-0 small">All your recent file actions — uploads, shares, deletes.</p>
          </div>
          <select class="form-select form-select-sm" id="activityFilter" style="max-width:180px">
            <option value="">All actions</option>
            <option value="file_create">Uploads</option>
            <option value="file_download">Downloads</option>
            <option value="file_share">Shares</option>
            <option value="file_delete">Deletes</option>
            <option value="file_edit">Edits</option>
          </select>
        </div>
        <div class="card shadow-sm">
          <div class="card-body" id="activityList">
            <div class="text-center py-5 text-muted"><div class="spinner-border mb-2"></div><div>Loading activity...</div></div>
          </div>
        </div>
        <div class="d-flex justify-content-center mt-3 gap-2">
          <button class="btn btn-outline-secondary btn-sm" id="prevBtn" disabled onclick="changePage(-1)"><i class="bi bi-chevron-left"></i> Prev</button>
          <span class="align-self-center small text-muted" id="pageInfo">Page 1</span>
          <button class="btn btn-outline-secondary btn-sm" id="nextBtn" onclick="changePage(1)">Next <i class="bi bi-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/api.js' %}"></script>
<script>
const tok=()=>localStorage.getItem('cloudvault_token')||localStorage.getItem('auth_token')||'';
const hdr=()=>({Authorization:`Token ${tok()}`});
if(!tok())window.location.href='/frontend/login/';
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(v){if(!v)return'—';return new Intl.DateTimeFormat(undefined,{dateStyle:'medium',timeStyle:'short'}).format(new Date(v));}

const actionMeta={
  file_create:{icon:'bi-file-earmark-plus',color:'#e0f2fe',iconColor:'#0284c7',label:'Uploaded'},
  file_edit:{icon:'bi-pencil-square',color:'#fef9c3',iconColor:'#ca8a04',label:'Edited'},
  file_delete:{icon:'bi-trash3',color:'#fee2e2',iconColor:'#dc2626',label:'Deleted'},
  file_restore:{icon:'bi-arrow-counterclockwise',color:'#dcfce7',iconColor:'#16a34a',label:'Restored'},
  file_download:{icon:'bi-download',color:'#ede9fe',iconColor:'#7c3aed',label:'Downloaded'},
  file_share:{icon:'bi-share',color:'#d1fae5',iconColor:'#059669',label:'Shared'},
  file_unshare:{icon:'bi-x-circle',color:'#fce7f3',iconColor:'#db2777',label:'Unshared'},
  comment_add:{icon:'bi-chat-left-text',color:'#fef3c7',iconColor:'#d97706',label:'Commented'},
};

let page=1,totalPages=1,filterAction='';

async function loadActivity(){
  const list=document.getElementById('activityList');
  list.innerHTML='<div class="text-center py-5 text-muted"><div class="spinner-border mb-2"></div><div>Loading...</div></div>';
  try {
    let url=`/api/v1/activity/?page=${page}`;
    if(filterAction)url+=`&action=${filterAction}`;
    const r=await axios.get(url,{headers:hdr()});
    const items=r.data.results||r.data||[];
    const count=r.data.count||items.length;
    totalPages=Math.ceil(count/20)||1;
    document.getElementById('pageInfo').textContent=`Page ${page} of ${totalPages}`;
    document.getElementById('prevBtn').disabled=page<=1;
    document.getElementById('nextBtn').disabled=page>=totalPages;
    if(!items.length){list.innerHTML='<div class="text-center py-5 text-muted"><i class="bi bi-activity d-block mb-2" style="font-size:2.5rem"></i>No activity found.</div>';return;}
    list.innerHTML=items.map(a=>{
      const m=actionMeta[a.action]||{icon:'bi-activity',color:'#f3f4f6',iconColor:'#6b7280',label:a.action};
      return `<div class="d-flex gap-3 align-items-start py-3 border-bottom">
        <div class="activity-icon" style="background:${m.color}"><i class="bi ${m.icon}" style="color:${m.iconColor}"></i></div>
        <div class="flex-grow-1">
          <div class="fw-semibold">${esc(m.label)}: <span class="text-muted fw-normal">${esc(a.file_name||a.target_file_name||'—')}</span></div>
          <small class="text-muted">${fmtDate(a.occurred_at)}</small>
        </div>
      </div>`;
    }).join('');
  } catch(e){list.innerHTML=`<div class="text-center py-4 text-danger">Failed to load: ${esc(e.response?.data?.detail||e.message)}</div>`;}
}

function changePage(dir){page=Math.max(1,Math.min(totalPages,page+dir));loadActivity();}
document.getElementById('activityFilter').onchange=e=>{filterAction=e.target.value;page=1;loadActivity();};
document.getElementById('logoutBtn').addEventListener('click',e=>{e.preventDefault();localStorage.clear();window.location.href='/frontend/login/';});
document.getElementById('themeToggle').addEventListener('click',()=>{const d=document.body.classList.toggle('dark-mode');localStorage.setItem('theme',d?'dark':'light');document.getElementById('themeIcon').className=d?'bi bi-sun':'bi bi-moon';});
loadActivity();
</script>
</body>
</html>
