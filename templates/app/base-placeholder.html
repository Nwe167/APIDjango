{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page - Cloud Storage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="{% static 'css/style.css' %}" rel="stylesheet" />
    <link href="{% static 'css/dashboard.css' %}" rel="stylesheet" />
  </head>
  <body>
    <div class="d-flex" style="height: 100vh">
      <!-- Sidebar (same as dashboard) -->
      <nav
        class="sidebar bg-light border-end"
        style="width: 280px; overflow-y: auto; flex-shrink: 0"
      >
        <div class="p-4">
          <div class="d-flex align-items-center mb-4">
            <div
              class="bg-primary text-white p-2 rounded"
              style="
                font-size: 1.5rem;
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <i class="bi bi-cloud"></i>
            </div>
            <span class="ms-2 fw-bold" style="font-size: 1.1rem">Drive</span>
          </div>

          <button class="btn btn-primary w-100 mb-4" id="uploadBtn">
            <i class="bi bi-plus-lg"></i> Upload File
          </button>

          <div class="nav flex-column nav-pills gap-2">
            <a
              href="/frontend/dashboard/"
              class="nav-link d-flex align-items-center"
            >
              <i class="bi bi-house-fill me-3"></i>
              <span>My Drive</span>
            </a>
            <a
              href="/frontend/files/"
              class="nav-link d-flex align-items-center"
            >
              <i class="bi bi-file-earmark me-3"></i>
              <span>Files</span>
            </a>
            <a
              href="/frontend/folders/"
              class="nav-link d-flex align-items-center"
            >
              <i class="bi bi-folder me-3"></i>
              <span>Folders</span>
            </a>
            <a
              href="/frontend/shared/"
              class="nav-link d-flex align-items-center"
            >
              <i class="bi bi-share me-3"></i>
              <span>Shared</span>
            </a>
            <a
              href="/frontend/trash/"
              class="nav-link d-flex align-items-center"
            >
              <i class="bi bi-trash me-3"></i>
              <span>Trash</span>
            </a>

            <hr class="my-3" />

            <a
              href="/frontend/settings/"
              class="nav-link d-flex align-items-center"
            >
              <i class="bi bi-gear me-3"></i>
              <span>Settings</span>
            </a>
            <a
              href="/frontend/profile/"
              class="nav-link d-flex align-items-center"
            >
              <i class="bi bi-person me-3"></i>
              <span>Profile</span>
            </a>
            <a href="/frontend/api/" class="nav-link d-flex align-items-center">
              <i class="bi bi-code-square me-3"></i>
              <span>File API</span>
            </a>
          </div>
        </div>
      </nav>

      <!-- Main Content -->
      <div class="flex-grow-1 d-flex flex-column" style="overflow: hidden">
        <!-- Top Navbar -->
        <nav
          class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top"
        >
          <div class="container-fluid px-4">
            <div class="d-flex align-items-center flex-grow-1">
              <input
                type="text"
                class="form-control form-control-sm"
                placeholder="Search..."
                style="max-width: 300px"
              />
            </div>

            <div class="d-flex align-items-center gap-2">
              <button class="btn btn-sm btn-link" id="themeToggle">
                <i
                  class="bi bi-moon"
                  id="themeIcon"
                  style="font-size: 1.2rem"
                ></i>
              </button>
              <div class="dropdown">
                <button
                  class="btn btn-sm btn-link dropdown-toggle"
                  data-bs-toggle="dropdown"
                >
                  <i class="bi bi-person-circle" style="font-size: 1.3rem"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <a class="dropdown-item" href="/frontend/profile/"
                      >Profile</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="/frontend/settings/"
                      >Settings</a
                    >
                  </li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" id="logoutBtn" href="#">Logout</a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </nav>

        <!-- Page Content -->
        <div class="flex-grow-1 overflow-auto">
          <div class="container-fluid p-4">
            <div class="card shadow-sm">
              <div class="card-body text-center py-5">
                <h5>This page is coming soon</h5>
                <p class="text-muted">
                  This section is being developed. Please check back soon.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/api.js' %}?v=2"></script>
    <script src="{% static 'js/auth.js' %}"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (typeof isAuthenticated === 'function' && !isAuthenticated()) {
          window.location.href = "/frontend/login/";
          return;
        }

        initTheme();

        document
          .getElementById("logoutBtn")
          .addEventListener("click", function (e) {
            e.preventDefault();
            logout();
          });

        document
          .getElementById("themeToggle")
          .addEventListener("click", function () {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem(
              "theme",
              document.body.classList.contains("dark-mode") ? "dark" : "light",
            );
          });
      });
    </script>
  </body>
</html>
