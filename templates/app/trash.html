{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trash - Cloud Storage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="{% static 'css/style.css' %}" rel="stylesheet" />
  <link href="{% static 'css/dashboard.css' %}" rel="stylesheet" />
</head>
<body>
<div class="d-flex" style="height:100vh">
  <!-- Sidebar -->
  <nav class="sidebar bg-light border-end" style="width:280px;overflow-y:auto;flex-shrink:0">
    <div class="p-4">
      <div class="d-flex align-items-center mb-4">
        <div class="bg-primary text-white p-2 rounded" style="font-size:1.5rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center">
          <i class="bi bi-cloud"></i>
        </div>
        <span class="ms-2 fw-bold" style="font-size:1.1rem">Drive</span>
      </div>
      <button class="btn btn-primary w-100 mb-4" onclick="window.location.href='/frontend/files/'">
        <i class="bi bi-plus-lg"></i> Upload File
      </button>
      <div class="nav flex-column nav-pills gap-2">
        <a href="/frontend/dashboard/" class="nav-link d-flex align-items-center" data-page="dashboard"><i class="bi bi-house-fill me-3"></i><span>My Drive</span></a>
        <a href="/frontend/files/" class="nav-link d-flex align-items-center" data-page="files"><i class="bi bi-file-earmark me-3"></i><span>Files</span></a>
        <a href="/frontend/folders/" class="nav-link d-flex align-items-center" data-page="folders"><i class="bi bi-folder me-3"></i><span>Folders</span></a>
        <a href="/frontend/shared/" class="nav-link d-flex align-items-center" data-page="shared"><i class="bi bi-share me-3"></i><span>Shared</span></a>
        <a href="/frontend/trash/" class="nav-link active d-flex align-items-center" data-page="trash"><i class="bi bi-trash me-3"></i><span>Trash</span></a>
        <hr class="my-3" />
        <a href="/frontend/activity/" class="nav-link d-flex align-items-center" data-page="activity"><i class="bi bi-activity me-3"></i><span>Activity</span></a>
        <a href="/frontend/notifications/" class="nav-link d-flex align-items-center" data-page="notifications"><i class="bi bi-bell me-3"></i><span>Notifications</span></a>
        <a href="/frontend/settings/" class="nav-link d-flex align-items-center" data-page="settings"><i class="bi bi-gear me-3"></i><span>Settings</span></a>
        <a href="/frontend/profile/" class="nav-link d-flex align-items-center" data-page="profile"><i class="bi bi-person me-3"></i><span>Profile</span></a>
        <a href="/frontend/api/" class="nav-link d-flex align-items-center" data-page="api"><i class="bi bi-code-square me-3"></i><span>File API</span></a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="flex-grow-1 d-flex flex-column" style="overflow:hidden">
    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
      <div class="container-fluid px-4">
        <div class="d-flex align-items-center flex-grow-1">
          <span class="fw-semibold text-muted">Trash</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-link" id="themeToggle" title="Toggle dark mode">
            <i class="bi bi-moon" id="themeIcon" style="font-size:1.2rem;color:#333"></i>
          </button>
          <div class="dropdown">
            <button class="btn btn-sm btn-link dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle" style="font-size:1.3rem;color:#333"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/frontend/profile/">Profile</a></li>
              <li><a class="dropdown-item" href="/frontend/settings/">Settings</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item" id="logoutBtn" href="#">Logout</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <!-- Page Content -->
    <div class="flex-grow-1 overflow-auto">
      <div class="container-fluid p-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <div>
            <h5 class="fw-bold mb-1"><i class="bi bi-trash3 me-2 text-danger"></i>Trash</h5>
            <p class="text-muted mb-0 small">Files in trash are deleted permanently after 30 days.</p>
          </div>
          <button class="btn btn-outline-danger btn-sm" id="emptyTrashBtn"><i class="bi bi-trash3-fill me-1"></i>Empty trash</button>
        </div>
        <div id="trashAlert" class="mb-3"></div>
        <div class="card shadow-sm">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr><th>Name</th><th>Size</th><th>Trashed by</th><th>Trashed on</th><th>Auto-delete</th><th class="text-end">Actions</th></tr>
              </thead>
              <tbody id="trashTableBody">
                <tr><td colspan="6" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script>
const tok = () => localStorage.getItem('cloudvault_token') || localStorage.getItem('auth_token') || '';
const hdr = () => ({ Authorization: `Token ${tok()}` });
if (!tok()) window.location.href = '/frontend/login/';

function fmt(b){if(!b||b<=0)return'—';const u=['B','KB','MB','GB'];let v=b,i=0;while(v>=1024&&i<u.length-1){v/=1024;i++;}return`${v.toFixed(i?1:0)} ${u[i]}`;}
function fmtDate(v){if(!v)return'—';return new Intl.DateTimeFormat(undefined,{dateStyle:'medium',timeStyle:'short'}).format(new Date(v));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showToast(msg,type='success'){
  let c=document.getElementById('toastContainer');
  if(!c){c=document.createElement('div');c.id='toastContainer';c.className='toast-container position-fixed top-0 end-0 p-3';document.body.appendChild(c);}
  const id='t'+Date.now();
  c.insertAdjacentHTML('beforeend',`<div id="${id}" class="toast align-items-center text-bg-${type} border-0"><div class="d-flex"><div class="toast-body">${esc(msg)}</div><button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`);
  const el=document.getElementById(id);
  new bootstrap.Toast(el,{delay:3500}).show();
  el.addEventListener('hidden.bs.toast',()=>el.remove());
}

async function loadTrash(){
  const tbody=document.getElementById('trashTableBody');
  tbody.innerHTML='<tr><td colspan="6" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Loading trash...</td></tr>';
  try {
    const r=await axios.get('/api/v1/trash/',{headers:hdr()});
    const items=r.data.results||r.data||[];
    if(!items.length){tbody.innerHTML='<tr><td colspan="6" class="text-center py-5 text-muted"><i class="bi bi-trash3 d-block mb-2" style="font-size:2.5rem"></i>Trash is empty</td></tr>';return;}
    tbody.innerHTML=items.map(item=>`
    <tr>
      <td><div class="d-flex align-items-center gap-2"><i class="bi bi-file-earmark text-muted"></i><span class="fw-semibold">${esc(item.original_name||item.file_name||'—')}</span></div></td>
      <td>${fmt(item.size_bytes)}</td>
      <td><small>${esc(item.trashed_by_email||'Me')}</small></td>
      <td><small>${fmtDate(item.created_at||item.trashed_at)}</small></td>
      <td><small class="text-danger">${fmtDate(item.purge_after)}</small></td>
      <td class="text-end">
        <button class="btn btn-sm btn-outline-success me-1" onclick="restoreItem('${item.id}','${esc(item.original_name||'')}')"><i class="bi bi-arrow-counterclockwise"></i> Restore</button>
        <button class="btn btn-sm btn-outline-danger" onclick="purgeItem('${item.id}','${esc(item.original_name||'')}')"><i class="bi bi-trash3-fill"></i> Delete</button>
      </td>
    </tr>`).join('');
  } catch(e){tbody.innerHTML=`<tr><td colspan="6" class="text-center py-4 text-danger">Failed to load trash: ${esc(e.response?.data?.detail||e.message)}</td></tr>`;}
}

async function restoreItem(id,name){
  try{await axios.post(`/api/v1/trash/${id}/restore/`,{},{headers:hdr()});showToast(`"${name}" restored`,'success');loadTrash();}
  catch(e){showToast('Failed to restore: '+(e.response?.data?.detail||e.message),'danger');}
}

async function purgeItem(id,name){
  if(!confirm(`Permanently delete "${name}"? This cannot be undone.`))return;
  try{await axios.delete(`/api/v1/trash/${id}/purge/`,{headers:hdr()});showToast(`"${name}" permanently deleted`,'warning');loadTrash();}
  catch(e){showToast('Failed to delete: '+(e.response?.data?.detail||e.message),'danger');}
}

document.getElementById('emptyTrashBtn').onclick=async()=>{
  if(!confirm('Permanently delete ALL files in trash?'))return;
  try{await axios.delete('/api/v1/trash/empty/',{headers:hdr()});showToast('Trash emptied','warning');loadTrash();}
  catch(e){showToast('Failed: '+(e.response?.data?.detail||e.message),'danger');}
};

document.getElementById('logoutBtn').addEventListener('click',e=>{e.preventDefault();localStorage.clear();window.location.href='/frontend/login/';});
document.getElementById('themeToggle').addEventListener('click',()=>{const d=document.body.classList.toggle('dark-mode');localStorage.setItem('theme',d?'dark':'light');document.getElementById('themeIcon').className=d?'bi bi-sun':'bi bi-moon';});

loadTrash();
</script>
</body>
</html>
