<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Category</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5" style="max-width:600px;">
  <h2 class="mb-4">Update Category (PUT)</h2>

  <form id="categoryForm" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Category ID</label>
      <input type="text" class="form-control" id="categoryId" required>
      <small class="form-text text-muted">ID 13 Category [Edited3] Update</small>
    </div>

    <div class="mb-3">
      <label class="form-label">Category Name</label>
      <input type="text" class="form-control" id="categoryName" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Category Image (optional)</label>
      <input type="file" class="form-control" id="categoryImage">
    </div>

    <button type="submit" class="btn btn-primary">Update Category</button>
  </form>

  <div id="msg" class="mt-3"></div>
</div>

<script>
const CATEGORY_API_BASE = "http://127.0.0.1:8000/api/APICategoryUD/";

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== "") {
    const cookies = document.cookie.split(";");
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + "=")) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

const csrftoken = getCookie("csrftoken");

document.getElementById("categoryForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const categoryId = document.getElementById("categoryId").value.trim();
  const name = document.getElementById("categoryName").value.trim();
  const image = document.getElementById("categoryImage").files[0];

  if (!categoryId) {
    document.getElementById("msg").innerHTML =
      `<div class="alert alert-danger">Error: Category ID is required</div>`;
    return;
  }

  const formData = new FormData();
  formData.append("categoryName", name);
  if (image) formData.append("categoryImage", image);

  try {
    const res = await fetch(CATEGORY_API_BASE + categoryId + "/", {
      method: "PUT",
      credentials: "same-origin",
      headers: {
        "X-CSRFToken": csrftoken
      },
      body: formData
    });

    const data = await res.json().catch(() => null);

    if (!res.ok) {
      throw new Error(data ? JSON.stringify(data) : ("HTTP " + res.status));
    }

    document.getElementById("msg").innerHTML =
      `<div class="alert alert-success">Category updated successfully ✅</div>`;

  } catch (err) {
    document.getElementById("msg").innerHTML =
      `<div class="alert alert-danger">Error: ${err.message}</div>`;
  }
});
</script>

</body>
</html>
