{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Cloud Storage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="{% static 'css/style.css' %}" rel="stylesheet" />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Manrope", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .auth-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 450px;
        width: 100%;
      }
      .auth-header {
        text-align: center;
        margin-bottom: 30px;
      }
      .auth-header .logo {
        font-size: 2.5rem;
        color: #667eea;
        margin-bottom: 10px;
      }
      .auth-header h1 {
        font-size: 1.8rem;
        font-weight: 600;
        color: #1f2937;
        margin: 0;
      }
      .form-control {
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        padding: 10px 14px;
        font-size: 0.95rem;
      }
      .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
      }
      .btn-auth {
        border-radius: 8px;
        padding: 10px 16px;
        font-weight: 500;
        width: 100%;
      }
      .auth-link {
        text-align: center;
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
      }
      .auth-link:hover {
        text-decoration: underline;
      }
      .alert {
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-header">
        <div class="logo"><i class="bi bi-cloud"></i></div>
        <h1>Cloud Storage</h1>
      </div>

      <!-- Alert Messages -->
      <div id="alertContainer"></div>

      <form id="registerForm">
        {% csrf_token %}
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Choose a username"
            required
          />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Create a strong password"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password_confirm" class="form-label"
            >Confirm Password</label
          >
          <input
            type="password"
            class="form-control"
            id="password_confirm"
            placeholder="Confirm your password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-auth mb-3">
          <i class="bi bi-person-plus"></i> Register
        </button>
      </form>

      <div style="text-align: center; color: #6b7280">
        Already have an account?
        <a href="/frontend/login/" class="auth-link">Login here</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="{% static 'js/api.js' %}?v=2"></script>
    <script>
      // Check if already logged in
      if (localStorage.getItem("cloudvault_user_id")) {
        window.location.href = "/frontend/dashboard/";
      }

      document
        .getElementById("registerForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const passwordConfirm = document.getElementById("password_confirm").value;

          if (password !== passwordConfirm) {
            showAlert("Passwords do not match", "danger");
            return;
          }

          if (password.length < 6) {
            showAlert("Password must be at least 6 characters", "danger");
            return;
          }

          try {
            await axios.post("/api/v1/users/register/", { username, email, password });
            showAlert("Account created! Logging in...", "success");

            setTimeout(async () => {
              try {
                const loginResponse = await axios.post("/api/auth/login/", { username, password });
                const data = loginResponse.data;
                localStorage.setItem("cloudvault_token", data.token);
                localStorage.setItem("cloudvault_user_id", data.user_id);
                localStorage.setItem("cloudvault_username", data.username);
                window.location.href = "/frontend/dashboard/";
              } catch (err) {
                showAlert("Account created, but login failed. Please login manually.", "warning");
                setTimeout(() => { window.location.href = "/frontend/login/"; }, 1500);
              }
            }, 1000);
          } catch (error) {
            let message = "Registration failed.";
            if (error.response?.data && typeof error.response.data === "object") {
              const parts = [];
              for (const [key, val] of Object.entries(error.response.data)) {
                parts.push(`${key}: ${Array.isArray(val) ? val.join(" ") : val}`);
              }
              if (parts.length) message = parts.join(" | ");
            }
            showAlert(message, "danger");
          }
        });

      function showAlert(message, type) {
        const container = document.getElementById("alertContainer");
        const el = document.createElement("div");
        el.className = `alert alert-${type} alert-dismissible fade show`;
        el.innerHTML = `${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
        container.appendChild(el);
      }
    </script>
  </body>
</html>
