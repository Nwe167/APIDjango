{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Cloud Storage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="{% static 'css/style.css' %}" rel="stylesheet" />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Manrope", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .auth-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 450px;
        width: 100%;
      }
      .auth-header {
        text-align: center;
        margin-bottom: 30px;
      }
      .auth-header .logo {
        font-size: 2.5rem;
        color: #667eea;
        margin-bottom: 10px;
      }
      .auth-header h1 {
        font-size: 1.8rem;
        font-weight: 600;
        color: #1f2937;
        margin: 0;
      }
      .form-control {
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        padding: 10px 14px;
        font-size: 0.95rem;
      }
      .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
      }
      .btn-auth {
        border-radius: 8px;
        padding: 10px 16px;
        font-weight: 500;
        width: 100%;
      }
      .auth-link {
        text-align: center;
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
      }
      .auth-link:hover {
        text-decoration: underline;
      }
      .alert {
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-header">
        <div class="logo"><i class="bi bi-cloud"></i></div>
        <h1>Cloud Storage</h1>
      </div>

      <!-- Alert Messages -->
      <div id="alertContainer"></div>

      <form id="loginForm">
        {% csrf_token %}
        <div class="mb-3">
          <label for="email" class="form-label">Email or Username</label>
          <input
            type="text"
            class="form-control"
            id="email"
            placeholder="Enter your email or username"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <div class="mb-3 text-end">
          <a
            href="/frontend/forgot-password/"
            class="auth-link"
            style="font-size: 0.9rem"
            >Forgot password?</a
          >
        </div>

        <button type="submit" class="btn btn-primary btn-auth mb-3">
          <i class="bi bi-door-open"></i> Login
        </button>
      </form>

      <div style="text-align: center; color: #6b7280">
        Don't have an account?
        <a href="/frontend/register/" class="auth-link">Register here</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="{% static 'js/api.js' %}?v=2"></script>
    <script>
      window.API_TOKEN = "{{ API_TOKEN }}";

      // Check if already logged in
      if (localStorage.getItem("cloudvault_user_id")) {
        window.location.href = "/frontend/dashboard/";
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const username = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          try {
            const response = await axios.post('/api/auth/login/', { username, password });
            const data = response.data;
            localStorage.setItem('cloudvault_token', data.token);
            localStorage.setItem('cloudvault_user_id', data.user_id);
            localStorage.setItem('cloudvault_username', data.username);
            window.API_TOKEN = data.token;
            showAlert("Login successful! Redirecting...", "success");
            setTimeout(() => { window.location.href = "/frontend/dashboard/"; }, 800);
          } catch (error) {
            // Retry with email local-part if full email was entered
            const username2 = document.getElementById("email").value;
            if (username2.includes('@') && error.response?.status === 400) {
              try {
                const resp2 = await axios.post('/api/auth/login/', { username: username2.split('@')[0], password });
                const data = resp2.data;
                localStorage.setItem('cloudvault_token', data.token);
                localStorage.setItem('cloudvault_user_id', data.user_id);
                localStorage.setItem('cloudvault_username', data.username);
                window.API_TOKEN = data.token;
                showAlert("Login successful! Redirecting...", "success");
                setTimeout(() => { window.location.href = "/frontend/dashboard/"; }, 800);
                return;
              } catch (e2) {}
            }
            const message = error.response?.data?.detail || "Login failed. Please check your credentials.";
            showAlert(message, "danger");
          }
        });

      function showAlert(message, type) {
        const container = document.getElementById("alertContainer");
        const alert = document.createElement("div");
        alert.className = `alert alert-${type} alert-dismissible fade show`;
        alert.innerHTML = `${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
        container.appendChild(alert);
      }
    </script>
  </body>
</html>
